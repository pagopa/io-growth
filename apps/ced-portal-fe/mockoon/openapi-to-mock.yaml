openapi: 3.0.3
info:
  title: Frontend Starter Blueprint Mock API
  version: 1.0.0
  description: OpenAPI da importare in Mockoon per avviare rapidamente i mock del frontend.
servers:
  - url: http://localhost:3001/api
tags:
  - name: Session
  - name: Dashboard
  - name: Benefits
  - name: AccessPoints
  - name: Health
paths:
  /health:
    get:
      tags:
        - Health
      summary: Healthcheck del mock server
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: mockoon
  /session:
    get:
      tags:
        - Session
      summary: Recupera la sessione corrente
      responses:
        '200':
          description: Sessione valida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionPayload'
              example:
                token: demo-token
                user:
                  id: '1'
                  name: Mario Rossi
                  email: mario.rossi@example.com
        '401':
          description: Sessione non valida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 401
                message: Unauthorized
  /dashboard:
    get:
      tags:
        - Dashboard
      summary: Recupera i KPI dashboard
      responses:
        '200':
          description: Dati dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
              example:
                items:
                  - id: sessions
                    label: Active sessions
                    value: '128'
                  - id: conversion
                    label: Conversion rate
                    value: '4.2%'
                  - id: latency
                    label: Median latency
                    value: 240ms
  /benefits:
    get:
      tags:
        - Benefits
      summary: Elenco agevolazioni
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
            enum:
              - UNDER_REVIEW
              - DRAFT
              - CHANGES_REQUESTED
              - PUBLISHED
              - SCHEDULED_PUBLICATION
      responses:
        '200':
          description: Lista agevolazioni
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BenefitsResponse'
              example:
                - name: Test Revisione
                  category: CULTURE_LEISURE
                  createdAt: '2026-03-28T09:15:30Z'
                  state: UNDER_REVIEW
                - name: Test Bozza
                  category: HEALTH_WELLNESS
                  createdAt: '2026-03-29T11:45:00Z'
                  state: DRAFT
                - name: Test modifiche richieste
                  category: EDUCATION
                  createdAt: '2026-03-30T14:20:15Z'
                  state: CHANGES_REQUESTED
                - name: Test Pubblicata
                  category: SPORT
                  createdAt: '2026-03-31T08:30:00Z'
                  state: PUBLISHED
                - name: Test Pubblicazione Programmata
                  category: HOME
                  createdAt: '2026-03-31T10:05:45Z'
                  state: SCHEDULED_PUBLICATION
                - name: Test Pubblicazione Programmata - 2
                  category: TELEPHONY_INTERNET
                  createdAt: '2026-04-02T16:50:22Z'
                  state: SCHEDULED_PUBLICATION
                - name: Test Pubblicata - 2
                  category: FINANCIAL_SERVICES
                  createdAt: '2026-04-05T09:12:10Z'
                  state: PUBLISHED
                - name: Test Bozza - 2
                  category: TRAVEL_TRANSPORT
                  createdAt: '2026-04-10T15:35:00Z'
                  state: DRAFT
                - name: Test Bozza - 3
                  category: SUSTAINABLE_MOBILITY
                  createdAt: '2026-04-15T11:20:33Z'
                  state: DRAFT
                - name: Test Bozza - 4
                  category: WORK_INTERNSHIPS
                  createdAt: '2026-04-20T18:05:19Z'
                  state: DRAFT
    post:
      tags:
        - Benefits
      summary: Crea una nuova agevolazione
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BenefitInput'
      responses:
        '201':
          description: Agevolazione creata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Benefit'
              example:
                id: ben-001
                name: Nuova agevolazione
                state: DRAFT
                createdAt: '2026-03-26T10:00:00Z'
        '400':
          description: Payload non valido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /access-points:
    get:
      tags:
        - AccessPoints
      summary: Elenco punti di accesso
      responses:
        '200':
          description: Lista punti di accesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessPointsResponse'
              example:
                items:
                  - id: ap-001
                    name: Sportello Ferrara Centro
                    address: Piazza Trento Trieste 1, Ferrara
                    city: Ferrara
components:
  schemas:
    SessionPayload:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
    DashboardItem:
      type: object
      required:
        - id
        - label
        - value
      properties:
        id:
          type: string
        label:
          type: string
        value:
          type: string
    DashboardResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DashboardItem'
    BenefitState:
      type: string
      enum:
        - UNDER_REVIEW
        - DRAFT
        - CHANGES_REQUESTED
        - PUBLISHED
        - SCHEDULED_PUBLICATION
    BenefitListItem:
      type: object
      required:
        - name
        - category
        - createdAt
        - state
      properties:
        name:
          type: string
          example: Test Revisione
        category:
          type: string
          example: CULTURE_LEISURE
        createdAt:
          type: string
          format: date-time
          description: Data e ora di creazione
          example: '2026-03-28T09:15:30Z'
        state:
          $ref: '#/components/schemas/BenefitState'
    Benefit:
      type: object
      required:
        - id
        - name
        - state
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        state:
          $ref: '#/components/schemas/BenefitState'
        createdAt:
          type: string
          format: date-time
    BenefitInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        state:
          $ref: '#/components/schemas/BenefitState'
    BenefitsResponse:
      type: array
      items:
        $ref: '#/components/schemas/BenefitListItem'
      example:
        - name: Test Revisione
          category: CULTURE_LEISURE
          createdAt: '2026-03-28T09:15:30Z'
          state: UNDER_REVIEW
        - name: Test Bozza
          category: HEALTH_WELLNESS
          createdAt: '2026-03-29T11:45:00Z'
          state: DRAFT
        - name: Test modifiche richieste
          category: EDUCATION
          createdAt: '2026-03-30T14:20:15Z'
          state: CHANGES_REQUESTED
        - name: Test Pubblicata
          category: SPORT
          createdAt: '2026-03-31T08:30:00Z'
          state: PUBLISHED
        - name: Test Pubblicazione Programmata
          category: HOME
          createdAt: '2026-03-31T10:05:45Z'
          state: SCHEDULED_PUBLICATION
        - name: Test Pubblicazione Programmata - 2
          category: TELEPHONY_INTERNET
          createdAt: '2026-04-02T16:50:22Z'
          state: SCHEDULED_PUBLICATION
        - name: Test Pubblicata - 2
          category: FINANCIAL_SERVICES
          createdAt: '2026-04-05T09:12:10Z'
          state: PUBLISHED
        - name: Test Bozza - 2
          category: TRAVEL_TRANSPORT
          createdAt: '2026-04-10T15:35:00Z'
          state: DRAFT
        - name: Test Bozza - 3
          category: SUSTAINABLE_MOBILITY
          createdAt: '2026-04-15T11:20:33Z'
          state: DRAFT
        - name: Test Bozza - 4
          category: WORK_INTERNSHIPS
          createdAt: '2026-04-20T18:05:19Z'
          state: DRAFT
    AccessPoint:
      type: object
      required:
        - id
        - name
        - address
        - city
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        city:
          type: string
    AccessPointsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccessPoint'
    ErrorResponse:
      type: object
      required:
        - statusCode
        - message
      properties:
        statusCode:
          type: integer
        message:
          type: string
